name: rag-app

# Hạ tầng cho app RAG: 3 DATABASE (Postgres + Redis + Qdrant) + UI để xem từng cái.
# App FastAPI chạy local (uvicorn) nối vào đây.
services:
  postgres:
    image: postgres:16
    container_name: rag-postgres
    environment:
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag
      POSTGRES_DB: rag
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: rag-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: rag-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrantdata:/qdrant/storage
    restart: unless-stopped

  # UI xem Redis trực quan -> http://localhost:5540 (Add database: host "redis", port 6379)
  redisinsight:
    image: redis/redisinsight:latest
    container_name: rag-redisinsight
    ports:
      - "5540:5540"
    depends_on:
      - redis
    restart: unless-stopped

  # UI xem Postgres trực quan -> http://localhost:8085 (tự kết nối sẵn db rag)
  pgweb:
    image: sosedoff/pgweb:latest
    container_name: rag-pgweb
    environment:
      DATABASE_URL: "postgres://rag:rag@postgres:5432/rag?sslmode=disable"
    ports:
      - "8085:8081"
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  qdrantdata:
